<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>About Me</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<aside class="sidebar">
  <h2>Vaishnavi Jai</h2>

  <div class="search">
    <input placeholder="Search..." />
  </div>

  <button id="themeToggle" class="toggle">Toggle</button>

  <nav class="nav">
    <a href="/index.html">About Me</a>
    <a href="/experience.html">Experience</a>
    <a href="/samples.html">Samples</a>
    <a href="/contact.html">Contact</a>
  </nav>
</aside>

<main class="main">
  <h1>About Me</h1>

  <h2>Overview</h2>
  <p>You build structured UX content systems.</p>

  <h2>Approach</h2>
  <p>You treat content as part of the product system.</p>
</main>

<aside class="toc">
  <h4>On this page</h4>
  <div id="toc"></div>
</aside>

<!-- shared script -->
<script>
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);

  document.getElementById("themeToggle").onclick = () => {
    const current = document.documentElement.getAttribute("data-theme");
    const next = current === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
  };

  document.querySelectorAll(".nav a").forEach(link => {
    if (link.href === window.location.href) link.classList.add("active");
  });

  const toc = document.getElementById("toc");
  document.querySelectorAll(".main h2").forEach(h => {
    const id = h.innerText.replace(/\s+/g, "-").toLowerCase();
    h.id = id;

    const a = document.createElement("a");
    a.href = "#" + id;
    a.textContent = h.innerText;

    toc.appendChild(a);
  });
</script>

</body>
</html>
